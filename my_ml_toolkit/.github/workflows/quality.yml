name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Run flake8
      run: |
        flake8 my_ml_toolkit tests --max-line-length=100 --extend-ignore=E203,W503 --format=json > flake8-report.json || true

    - name: Run mypy
      run: |
        mypy my_ml_toolkit --ignore-missing-imports --junit-xml=mypy-report.xml || true

    - name: Check code formatting
      run: |
        black --line-length=100 --check my_ml_toolkit tests --diff

    - name: Check import sorting
      run: |
        isort --profile=black --line-length=100 --check-only my_ml_toolkit tests --diff
